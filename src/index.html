<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>WinNotch</title>
<style>
@font-face { font-family:'Sora'; src:url('../assets/fonts/Sora-Thin.ttf') format('truetype'); font-weight:100; }
@font-face { font-family:'Sora'; src:url('../assets/fonts/Sora-ExtraLight.ttf') format('truetype'); font-weight:200; }
@font-face { font-family:'Sora'; src:url('../assets/fonts/Sora-Light.ttf') format('truetype'); font-weight:300; }
@font-face { font-family:'Sora'; src:url('../assets/fonts/Sora-Regular.ttf') format('truetype'); font-weight:400; }
@font-face { font-family:'Sora'; src:url('../assets/fonts/Sora-SemiBold.ttf') format('truetype'); font-weight:600; }
@font-face { font-family:'Sora'; src:url('../assets/fonts/Sora-Bold.ttf') format('truetype'); font-weight:700; }
@font-face { font-family:'Sora'; src:url('../assets/fonts/Sora-ExtraBold.ttf') format('truetype'); font-weight:800; }

:root {
  --font: 'Sora', system-ui, sans-serif;
  --cw: 262px;  --ch: 34px;
  --ew: 490px;  --eh: 152px;
  --ink:  #000;
  --w100: #fff;
  --w90:  rgba(255,255,255,0.92);
  --w65:  rgba(255,255,255,0.65);
  --w40:  rgba(255,255,255,0.40);
  --w22:  rgba(255,255,255,0.22);
  --w12:  rgba(255,255,255,0.12);
  --w07:  rgba(255,255,255,0.07);
  --w04:  rgba(255,255,255,0.04);
  --green:#34d962; --amber:#ffaa00; --red:#ff4444;
  --spring: cubic-bezier(0.32,0.72,0.00,1.00);
}

*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}

html,body{
  width:100vw; height:165px;
  background:transparent; overflow:hidden;
  font-family:var(--font);
  -webkit-font-smoothing:antialiased;
  -moz-osx-font-smoothing:grayscale;
  user-select:none; pointer-events:none;
}

/* Shadow */
#sw{
  pointer-events:none;
  position:absolute; top:0; left:50%; transform:translateX(-50%);
  width:var(--cw); height:var(--ch);
  border-radius:0 0 14px 14px;
  filter:drop-shadow(0 5px 18px rgba(0,0,0,0.82)) drop-shadow(0 1px 5px rgba(0,0,0,0.60));
  transition:width 480ms var(--spring),height 480ms var(--spring),border-radius 480ms var(--spring),filter 320ms ease;
  will-change:width,height; z-index:0;
}
#sw::before{content:'';position:absolute;inset:0;background:var(--ink);border-radius:inherit}
#sw.open{width:var(--ew);height:var(--eh);border-radius:0 0 28px 28px;
  filter:drop-shadow(0 10px 32px rgba(0,0,0,0.70)) drop-shadow(0 2px 8px rgba(0,0,0,0.40))}

/* Notch */
#notch{
  pointer-events:all;
  position:absolute; top:0; left:50%; transform:translateX(-50%);
  z-index:1;
  width:var(--cw); height:var(--ch);
  background:var(--ink);
  border:0.5px solid rgba(255,255,255,0.11);
  border-top:none;
  border-radius:0 0 14px 14px;
  overflow:hidden;
  transition:width 480ms var(--spring),height 480ms var(--spring),border-radius 480ms var(--spring);
  will-change:width,height;
}
#notch.open{width:var(--ew);height:var(--eh);border-radius:0 0 28px 28px;border-color:rgba(255,255,255,0.13)}

/* ── Collapsed ─────────────────── */
#pill{
  position:absolute;inset:0;
  display:flex;align-items:center;justify-content:space-between;
  padding:0 14px; z-index:2;
  transition:opacity 140ms ease,transform 220ms var(--spring);
}
#notch.open #pill{opacity:0;transform:scale(0.88) translateY(-5px);pointer-events:none}

.p-time{
  font-size:12px; font-weight:700;
  color:var(--w90); letter-spacing:0.01em;
  font-variant-numeric:tabular-nums;
}
.p-dots{display:flex;gap:5px;align-items:center}
.dot{width:5px;height:5px;border-radius:50%;background:var(--w22);transition:background .3s,box-shadow .3s,transform .25s}
.dot.on{background:var(--w100);box-shadow:0 0 4px rgba(255,255,255,0.5)}
.dot.beat{background:var(--green);box-shadow:0 0 6px rgba(52,217,98,0.9);animation:beat 1.1s ease-in-out infinite}
@keyframes beat{0%,100%{transform:scale(1)}50%{transform:scale(1.65)}}
.p-cpu{font-size:10px;font-weight:600;color:var(--w40);font-variant-numeric:tabular-nums;letter-spacing:0.04em}

/* ── Expanded ──────────────────── */
#panel{
  position:absolute;inset:0;
  padding:12px 16px 11px;
  display:flex;flex-direction:column;gap:8px;
  pointer-events:none; opacity:0;
  transform:translateY(-8px) scale(0.978);
  transition:opacity 240ms ease 80ms,transform 420ms var(--spring) 60ms;
}
#notch.open #panel{opacity:1;transform:none;pointer-events:all}

/* Top row */
.top{display:flex;align-items:flex-start;justify-content:space-between;gap:8px}

/* Clock — bold & punchy */
.clk{display:flex;flex-direction:column;line-height:1}
.clk-hm{
  font-size:40px; font-weight:700;
  color:var(--w100); letter-spacing:-0.05em;
  font-variant-numeric:tabular-nums;
  line-height:1;
}
.clk-date{
  font-size:8.5px; font-weight:700;
  color:var(--w40); letter-spacing:0.20em;
  text-transform:uppercase; margin-top:4px;
}

/* Stats */
.stats{display:flex;flex-direction:column;gap:7px;min-width:142px;padding-top:4px}
.stat{display:flex;align-items:center;gap:7px}
.stat-lbl{
  font-size:8px; font-weight:800;
  color:var(--w40); letter-spacing:0.16em;
  text-transform:uppercase; min-width:26px; flex-shrink:0;
}
.stat-bar{flex:1;height:3px;background:rgba(255,255,255,0.09);border-radius:2px;overflow:hidden}
.stat-fill{
  height:100%;border-radius:2px;background:rgba(255,255,255,0.50);
  width:0%;transition:width 0.85s var(--spring),background 0.35s;
}
.stat-fill.mid{background:var(--amber)} .stat-fill.high{background:var(--red)}
.stat-val{
  font-size:9.5px;font-weight:700;
  color:var(--w65);font-variant-numeric:tabular-nums;
  min-width:28px;text-align:right;flex-shrink:0;
}

/* Divider */
.div{
  height:1px;
  background:linear-gradient(90deg,transparent,rgba(255,255,255,0.10) 20%,rgba(255,255,255,0.10) 80%,transparent);
  flex-shrink:0;margin:0 1px;
}

/* Media row */
.media{display:flex;align-items:center;gap:10px;flex:1;min-height:0}

.art{
  width:40px;height:40px;border-radius:9px;flex-shrink:0;
  overflow:hidden;background:var(--w04);
  border:1px solid var(--w12);
  position:relative;display:flex;align-items:center;justify-content:center;
}
.art img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;border-radius:8px}
.art-ico{color:var(--w40)}
.art-ico svg{width:16px;height:16px}

.track{flex:1;min-width:0;display:flex;flex-direction:column;gap:2px}
.track-title{
  font-size:12.5px;font-weight:700;
  color:var(--w90);
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
  line-height:1.25;letter-spacing:-0.02em;
}
.track-artist{
  font-size:9.5px;font-weight:600;
  color:var(--w40);
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
  line-height:1.3;letter-spacing:0.01em;
}
.track-prog{height:2px;background:rgba(255,255,255,0.08);border-radius:1px;overflow:hidden;margin-top:6px}
.track-prog-fill{height:100%;border-radius:1px;background:rgba(255,255,255,0.40);width:0%;transition:width 1.4s linear}

/* Controls */
.ctrl{display:flex;align-items:center;gap:2px;flex-shrink:0}
.mc{
  width:28px;height:28px;border-radius:50%;border:none;background:transparent;
  color:var(--w40);display:flex;align-items:center;justify-content:center;
  cursor:pointer;transition:color 80ms,background 80ms,transform 60ms;
}
.mc:hover{color:var(--w90);background:var(--w07)}
.mc:active{transform:scale(0.74)}
.mc svg{width:13px;height:13px}
.mc.pp{width:30px;height:30px;background:var(--w07);color:var(--w90);border:1px solid var(--w22)}
.mc.pp:hover{background:var(--w12)}
.mc.pp svg{width:14px;height:14px}

/* Source badge */
.badge{
  font-size:7px;font-weight:800;letter-spacing:0.12em;text-transform:uppercase;
  padding:2px 6px;border-radius:100px;flex-shrink:0;
  display:none;align-items:center;border:1px solid;
}
.badge.yt{display:flex;color:#ff5050;border-color:rgba(255,80,80,0.28);background:rgba(255,80,80,0.08)}
.badge.sp{display:flex;color:var(--green);border-color:rgba(52,217,98,0.28);background:rgba(52,217,98,0.08)}
.badge.br{display:flex;color:var(--w40);border-color:var(--w12);background:var(--w04)}
</style>
</head>
<body>

<div id="sw"></div>

<div id="notch">
  <!-- Collapsed -->
  <div id="pill">
    <span class="p-time" id="pt">12:00 AM</span>
    <div class="p-dots">
      <div class="dot" id="d-media"></div>
      <div class="dot on"></div>
      <div class="dot on"></div>
    </div>
    <span class="p-cpu" id="p-cpu">--%</span>
  </div>

  <!-- Expanded -->
  <div id="panel">
    <div class="top">
      <div class="clk">
        <div class="clk-hm"   id="et">12:00</div>
        <div class="clk-date" id="ed">SAT, MAR 14</div>
      </div>
      <div class="stats">
        <div class="stat">
          <span class="stat-lbl">CPU</span>
          <div class="stat-bar"><div class="stat-fill" id="cpu-fill"></div></div>
          <span class="stat-val" id="cpu-val">--%</span>
        </div>
        <div class="stat">
          <span class="stat-lbl">RAM</span>
          <div class="stat-bar"><div class="stat-fill" id="ram-fill"></div></div>
          <span class="stat-val" id="ram-val">--%</span>
        </div>
      </div>
    </div>

    <div class="div"></div>

    <div class="media">
      <div class="art" id="m-art">
        <div class="art-ico">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6">
            <path d="M9 18V5l12-2v13"/>
            <circle cx="6" cy="18" r="3"/>
            <circle cx="18" cy="16" r="3"/>
          </svg>
        </div>
      </div>
      <div class="track">
        <div class="track-title"  id="m-title">Nothing playing</div>
        <div class="track-artist" id="m-artist">Play media to see it here</div>
        <div class="track-prog"><div class="track-prog-fill" id="m-prog"></div></div>
      </div>
      <div class="ctrl">
        <button class="mc" id="btn-prev">
          <svg viewBox="0 0 24 24" fill="currentColor"><path d="M6 6h2v12H6zm3.5 6 8.5 6V6z"/></svg>
        </button>
        <button class="mc pp" id="btn-play">
          <svg id="ico-play"  viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg>
          <svg id="ico-pause" viewBox="0 0 24 24" fill="currentColor" style="display:none"><path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/></svg>
        </button>
        <button class="mc" id="btn-next">
          <svg viewBox="0 0 24 24" fill="currentColor"><path d="M6 18l8.5-6L6 6v12zm8-12v12h2V6h-2z"/></svg>
        </button>
      </div>
      <span class="badge" id="m-badge"></span>
    </div>
  </div>
</div>

<script>
'use strict';
const notch = document.getElementById('notch');
const sw    = document.getElementById('sw');

// ── Rock-solid hover tracking using document mousemove ──────────────────────
// mouseleave on a parent fires when moving over children — unreliable.
// Document-level hit testing is the only correct approach.
let isOpen = false, expandT = null, collapseT = null;

function rectContains(r, x, y) {
  return x >= r.left && x <= r.right && y >= r.top && y <= r.bottom;
}

function open() {
  clearTimeout(collapseT);
  if (isOpen) return;
  clearTimeout(expandT);
  expandT = setTimeout(() => {
    isOpen = true;
    notch.classList.add('open');
    sw.classList.add('open');
    window.api?.mouseEnter?.();
  }, 35);
}

function close() {
  clearTimeout(expandT);
  if (!isOpen) return;
  clearTimeout(collapseT);
  collapseT = setTimeout(() => {
    isOpen = false;
    notch.classList.remove('open');
    sw.classList.remove('open');
    window.api?.mouseLeave?.();
  }, 100);
}

document.addEventListener('mousemove', e => {
  rectContains(notch.getBoundingClientRect(), e.clientX, e.clientY) ? open() : close();
}, { passive: true });
document.addEventListener('mouseleave', close, { passive: true });

// ── Clock ───────────────────────────────────────────────────────────────────
const DAYS=['SUN','MON','TUE','WED','THU','FRI','SAT'];
const MONTHS=['JAN','FEB','MAR','APR','MAY','JUN','JUL','AUG','SEP','OCT','NOV','DEC'];
function tick(){
  const n=new Date();
  let h=n.getHours();
  const m=String(n.getMinutes()).padStart(2,'0');
  const ap=h>=12?'PM':'AM';
  h=h%12||12;
  document.getElementById('pt').textContent=`${h}:${m} ${ap}`;
  document.getElementById('et').textContent=`${h}:${m}`;
  document.getElementById('ed').textContent=`${DAYS[n.getDay()]}, ${MONTHS[n.getMonth()]} ${n.getDate()}`;
}
tick(); setInterval(tick,1000);

// ── Stats ───────────────────────────────────────────────────────────────────
function barCls(p){ return p>=80?'high':p>=55?'mid':'' }
async function refreshStats(){
  try{
    if(!window.api?.getStats) return;
    const s=await window.api.getStats();
    document.getElementById('p-cpu').textContent=s.cpu+'%';
    const cf=document.getElementById('cpu-fill');
    cf.style.width=s.cpu+'%'; cf.className='stat-fill '+barCls(s.cpu);
    document.getElementById('cpu-val').textContent=s.cpu+'%';
    const rf=document.getElementById('ram-fill');
    rf.style.width=s.ram+'%'; rf.className='stat-fill '+barCls(s.ram);
    document.getElementById('ram-val').textContent=s.ram+'%';
  }catch(_){}
}
refreshStats(); setInterval(refreshStats,2500);

// ── Media ───────────────────────────────────────────────────────────────────
const ART_PH=`<div class="art-ico"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"><path d="M9 18V5l12-2v13"/><circle cx="6" cy="18" r="3"/><circle cx="18" cy="16" r="3"/></svg></div>`;

function setPlay(p){
  document.getElementById('ico-play').style.display=p?'none':'';
  document.getElementById('ico-pause').style.display=p?'':'none';
}

function srcInfo(s){
  if(!s) return{cls:'',lbl:''};
  const l=s.toLowerCase();
  if(l.includes('spotify'))  return{cls:'sp',lbl:'SPOTIFY'};
  if(l.includes('youtube'))  return{cls:'yt',lbl:'YOUTUBE'};
  if(l.match(/chrome|msedge|edge|firefox/)) return{cls:'yt',lbl:'BROWSER'};
  return{cls:'br',lbl:'MEDIA'};
}

let lastArt='', lastTitle='';
async function refreshMedia(){
  try{
    if(!window.api?.getMedia) return;
    const m=await window.api.getMedia();
    if(!m||!m.title){
      document.getElementById('m-title').textContent='Nothing playing';
      document.getElementById('m-artist').textContent='Play media to see it here';
      document.getElementById('m-prog').style.width='0%';
      document.getElementById('m-badge').className='badge';
      document.getElementById('d-media').className='dot';
      if(lastTitle){document.getElementById('m-art').innerHTML=ART_PH;lastArt='';lastTitle='';}
      setPlay(false); return;
    }
    document.getElementById('m-title').textContent=m.title||'—';
    document.getElementById('m-artist').textContent=m.artist||m.album||'—';
    document.getElementById('m-prog').style.width=
      m.dur>0?Math.min(100,(m.pos/m.dur)*100).toFixed(1)+'%':'0%';
    setPlay(!!m.playing);
    document.getElementById('d-media').className=m.playing?'dot beat':'dot on';
    const {cls,lbl}=srcInfo(m.src);
    const badge=document.getElementById('m-badge');
    badge.textContent=lbl; badge.className='badge '+cls;
    if(m.art&&m.art!==lastArt){
      lastArt=m.art;
      const artEl=document.getElementById('m-art');
      const img=new Image();
      img.onload=()=>{artEl.innerHTML='';const el=document.createElement('img');el.src=img.src;artEl.appendChild(el);};
      img.onerror=()=>{artEl.innerHTML=ART_PH;};
      img.src='data:image/jpeg;base64,'+m.art;
    }else if(!m.art&&m.title!==lastTitle){
      document.getElementById('m-art').innerHTML=ART_PH; lastArt='';
    }
    lastTitle=m.title;
  }catch(_){}
}
refreshMedia(); setInterval(refreshMedia,1500);
</script>
</body>
</html>
