<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>WinNotch</title>
<style>
/* ─────────────────────────────────────────────────
   FONT
───────────────────────────────────────────────── */
@font-face {
  font-family: 'NF';
  src: url('font.otf') format('opentype');
  font-weight: 100 900;
  font-display: block;
}

/* ─────────────────────────────────────────────────
   TOKENS
───────────────────────────────────────────────── */
:root {
  --f: 'NF', 'SF Pro Display', system-ui, sans-serif;

  /* Notch sizes */
  --cw: 260px;  /* collapsed width  */
  --ch: 32px;   /* collapsed height */
  --ew: 480px;  /* expanded width   */
  --eh: 136px;  /* expanded height  */

  /* Colours — pitch black + white hierarchy */
  --bg:    #000;
  --b1:  rgba(255,255,255,0.92);
  --b2:  rgba(255,255,255,0.55);
  --b3:  rgba(255,255,255,0.32);
  --b4:  rgba(255,255,255,0.14);
  --b5:  rgba(255,255,255,0.07);
  --b6:  rgba(255,255,255,0.04);
  --rim: rgba(255,255,255,0.08);

  --green: #30d158;  /* Apple green  */
  --amber: #ff9f0a;  /* Apple orange */
  --red:   #ff453a;  /* Apple red    */
  --blue:  #0a84ff;  /* Apple blue   */

  /* Spring */
  --sp: cubic-bezier(0.36, 0.66, 0.04, 1);
}

/* ─────────────────────────────────────────────────
   RESET
───────────────────────────────────────────────── */
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

html, body {
  width: 100vw; height: 160px;
  background: transparent;
  overflow: hidden;
  font-family: var(--f);
  -webkit-font-smoothing: antialiased;
  user-select: none;
  /* Body transparent & click-through by default */
  pointer-events: none;
}

/* ─────────────────────────────────────────────────
   NOTCH PILL
   Lives centered in the full-width transparent window.
   CSS-only morphing — zero Electron resize, zero jank.
───────────────────────────────────────────────── */
#N {
  pointer-events: all;
  position: absolute;
  top: 0; left: 50%; transform: translateX(-50%);

  width:  var(--cw);
  height: var(--ch);

  background: var(--bg);
  border: 1px solid var(--rim);
  border-top: none;
  border-radius: 0 0 18px 18px;
  overflow: hidden;

  box-shadow:
    0 2px 12px  rgba(0,0,0,0.95),
    0 10px 40px rgba(0,0,0,0.70);

  /* Apple Dynamic Island spring */
  transition:
    width         520ms var(--sp),
    height        520ms var(--sp),
    border-radius 520ms var(--sp),
    box-shadow    350ms ease;
  will-change: width, height;
}

#N.open {
  width:  var(--ew);
  height: var(--eh);
  border-radius: 0 0 26px 26px;
  box-shadow:
    0 4px 24px  rgba(0,0,0,1),
    0 28px 72px rgba(0,0,0,0.85),
    0 0 0 0.5px rgba(255,255,255,0.09) inset;
}

/* ─────────────────────────────────────────────────
   COLLAPSED VIEW
───────────────────────────────────────────────── */
#pill {
  position: absolute; inset: 0;
  display: flex; align-items: center;
  justify-content: space-between;
  padding: 0 15px;
  z-index: 10;
  transition: opacity 180ms ease, transform 240ms var(--sp);
}
#N.open #pill { opacity: 0; transform: scale(0.93) translateY(-2px); pointer-events: none; }

.p-time {
  font-size: 12.5px; font-weight: 400;
  color: var(--b1);
  letter-spacing: 0.01em;
  font-variant-numeric: tabular-nums;
}

.p-dots { display: flex; gap: 5px; align-items: center; }

.dot {
  width: 4px; height: 4px; border-radius: 50%;
  background: var(--b4);
  transition: background 0.35s, box-shadow 0.35s, transform 0.3s;
}
.dot.on   { background: var(--b1); box-shadow: 0 0 5px rgba(255,255,255,0.45); transform: scale(1.1); }
.dot.beat {
  background: var(--green);
  box-shadow: 0 0 7px rgba(48,209,88,0.9);
  animation: beat 1.1s ease-in-out infinite;
}
@keyframes beat { 0%,100%{transform:scale(1)} 50%{transform:scale(1.5)} }

.p-right {
  display: flex; align-items: center; gap: 6px;
}
.p-cpu-val {
  font-size: 10px; font-weight: 400;
  color: var(--b3);
  font-variant-numeric: tabular-nums;
}

/* ─────────────────────────────────────────────────
   EXPANDED PANEL
───────────────────────────────────────────────── */
#panel {
  position: absolute; inset: 0;
  padding: 12px 15px 11px;
  display: flex; flex-direction: column; gap: 8px;
  pointer-events: none; opacity: 0;
  transform: translateY(-5px) scale(0.984);
  transition:
    opacity   280ms ease 100ms,
    transform 420ms var(--sp) 75ms;
}
#N.open #panel { opacity: 1; transform: none; pointer-events: all; }

/* ── Top row: Clock + Stats ── */
.top-row {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 10px;
}

/* Clock */
.clock {
  display: flex;
  flex-direction: column;
  line-height: 1;
  gap: 0;
}
.clock-time {
  font-size: 34px;
  font-weight: 200;
  color: #fff;
  letter-spacing: -0.05em;
  font-variant-numeric: tabular-nums;
  line-height: 1;
}
.clock-date {
  font-size: 9.5px;
  font-weight: 400;
  color: var(--b3);
  letter-spacing: 0.12em;
  text-transform: uppercase;
  margin-top: 3px;
}

/* Stats group — right side of top row */
.stats-group {
  display: flex;
  flex-direction: column;
  gap: 5px;
  min-width: 130px;
}

.stat-row {
  display: flex;
  align-items: center;
  gap: 7px;
}

/* SVG icon container */
.s-icon {
  width: 14px; height: 14px;
  flex-shrink: 0;
  display: flex; align-items: center; justify-content: center;
  color: var(--b3);
}
.s-icon svg { width: 14px; height: 14px; }

.s-bar {
  flex: 1;
  height: 3px;
  background: rgba(255,255,255,0.08);
  border-radius: 2px;
  overflow: hidden;
}
.s-fill {
  height: 100%; border-radius: 2px;
  background: rgba(255,255,255,0.50);
  width: 0%;
  transition: width 0.9s var(--sp), background 0.4s ease;
}
.s-fill.mid  { background: var(--amber); }
.s-fill.high { background: var(--red);   }

.s-val {
  font-size: 10px; font-weight: 400;
  color: var(--b2);
  font-variant-numeric: tabular-nums;
  min-width: 28px; text-align: right;
  flex-shrink: 0;
}

/* Divider */
.divider {
  height: 1px;
  background: linear-gradient(90deg, transparent, var(--b4), transparent);
  flex-shrink: 0;
}

/* ── Media row ── */
.media-row {
  display: flex;
  align-items: center;
  gap: 10px;
  flex: 1;
}

/* Album art */
.m-art {
  width: 34px; height: 34px;
  border-radius: 8px;
  background: var(--b5);
  flex-shrink: 0;
  overflow: hidden;
  position: relative;
  display: flex; align-items: center; justify-content: center;
}
.m-art img {
  position: absolute; inset: 0;
  width: 100%; height: 100%;
  object-fit: cover;
  border-radius: 8px;
  transition: opacity 0.3s;
}
.m-art-icon { color: var(--b3); }
.m-art-icon svg { width: 16px; height: 16px; }

/* Track info */
.m-info {
  flex: 1; min-width: 0;
  display: flex; flex-direction: column; gap: 2px;
}
.m-title {
  font-size: 12px; font-weight: 400;
  color: var(--b1);
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  line-height: 1.25;
}
.m-artist {
  font-size: 10px; font-weight: 400;
  color: var(--b3);
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  line-height: 1.25;
}

/* Progress */
.m-prog-wrap {
  height: 2px;
  background: rgba(255,255,255,0.07);
  border-radius: 1px; overflow: hidden;
  margin-top: 4px;
}
.m-prog-fill {
  height: 100%; border-radius: 1px;
  background: rgba(255,255,255,0.42);
  width: 0%;
  transition: width 1.2s linear;
}

/* Controls */
.m-ctrl { display: flex; align-items: center; gap: 2px; flex-shrink: 0; }

.mc {
  width: 28px; height: 28px;
  border-radius: 50%; border: none; background: transparent;
  color: var(--b3);
  display: flex; align-items: center; justify-content: center;
  cursor: pointer;
  transition: color 100ms, background 100ms, transform 70ms;
}
.mc:hover  { color: var(--b1); background: var(--b5); }
.mc:active { transform: scale(0.80); }
.mc svg { width: 13px; height: 13px; }

.mc.play {
  width: 30px; height: 30px;
  background: var(--b5);
  color: var(--b1);
  border: 1px solid var(--b4);
}
.mc.play:hover { background: var(--b4); }
.mc.play svg   { width: 14px; height: 14px; }

/* Source badge */
.m-src {
  font-size: 8px; font-weight: 400;
  letter-spacing: 0.07em; text-transform: uppercase;
  padding: 2px 7px; border-radius: 100px;
  flex-shrink: 0;
  display: none;
  align-items: center; gap: 3px;
  border: 1px solid;
}
.m-src.yt { display:flex; color:#ff4040; border-color:rgba(255,64,64,.22); background:rgba(255,64,64,.07); }
.m-src.sp { display:flex; color:var(--green); border-color:rgba(48,209,88,.22); background:rgba(48,209,88,.07); }
.m-src.br { display:flex; color:var(--b3);    border-color:var(--rim);          background:var(--b6); }
</style>
</head>
<body>
<div id="N">

  <!-- ══ COLLAPSED ══ -->
  <div id="pill">
    <span class="p-time" id="pt">12:00 PM</span>
    <div class="p-dots">
      <div class="dot" id="d-media"></div>
      <div class="dot on"></div>
      <div class="dot on"></div>
    </div>
    <div class="p-right">
      <!-- mini CPU bar in pill -->
      <span class="p-cpu-val" id="p-cpu">--%</span>
    </div>
  </div>

  <!-- ══ EXPANDED ══ -->
  <div id="panel">

    <!-- top: clock + stats -->
    <div class="top-row">

      <div class="clock">
        <div class="clock-time" id="et">12:00</div>
        <div class="clock-date" id="ed">SAT, MAR 14</div>
      </div>

      <div class="stats-group">
        <!-- CPU -->
        <div class="stat-row">
          <div class="s-icon">
            <!-- CPU chip icon -->
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
              <rect x="4" y="4" width="16" height="16" rx="2"/>
              <rect x="8" y="8" width="8"  height="8"  rx="1"/>
              <line x1="9"  y1="1" x2="9"  y2="4"/>
              <line x1="15" y1="1" x2="15" y2="4"/>
              <line x1="9"  y1="20" x2="9"  y2="23"/>
              <line x1="15" y1="20" x2="15" y2="23"/>
              <line x1="1"  y1="9"  x2="4"  y2="9"/>
              <line x1="1"  y1="15" x2="4"  y2="15"/>
              <line x1="20" y1="9"  x2="23" y2="9"/>
              <line x1="20" y1="15" x2="23" y2="15"/>
            </svg>
          </div>
          <div class="s-bar"><div class="s-fill" id="cpu-f" style="width:0%"></div></div>
          <span class="s-val" id="cpu-v">--%</span>
        </div>
        <!-- RAM -->
        <div class="stat-row">
          <div class="s-icon">
            <!-- RAM stick icon -->
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
              <rect x="1" y="7" width="22" height="10" rx="2"/>
              <line x1="5"  y1="7"  x2="5"  y2="17"/>
              <line x1="9"  y1="7"  x2="9"  y2="17"/>
              <line x1="13" y1="7"  x2="13" y2="17"/>
              <line x1="17" y1="7"  x2="17" y2="17"/>
              <line x1="5"  y1="3"  x2="5"  y2="7"/>
              <line x1="9"  y1="3"  x2="9"  y2="7"/>
              <line x1="15" y1="3"  x2="15" y2="7"/>
              <line x1="19" y1="3"  x2="19" y2="7"/>
              <line x1="5"  y1="17" x2="5"  y2="21"/>
              <line x1="9"  y1="17" x2="9"  y2="21"/>
              <line x1="15" y1="17" x2="15" y2="21"/>
              <line x1="19" y1="17" x2="19" y2="21"/>
            </svg>
          </div>
          <div class="s-bar"><div class="s-fill" id="ram-f" style="width:0%"></div></div>
          <span class="s-val" id="ram-v">--%</span>
        </div>
      </div>

    </div>

    <div class="divider"></div>

    <!-- media -->
    <div class="media-row">
      <div class="m-art" id="m-art">
        <div class="m-art-icon">
          <!-- music note icon -->
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
            <path d="M9 18V5l12-2v13"/>
            <circle cx="6" cy="18" r="3"/>
            <circle cx="18" cy="16" r="3"/>
          </svg>
        </div>
      </div>

      <div class="m-info">
        <div class="m-title"  id="mt">Nothing playing</div>
        <div class="m-artist" id="ma">Play YouTube, Spotify or any media</div>
        <div class="m-prog-wrap">
          <div class="m-prog-fill" id="mp" style="width:0%"></div>
        </div>
      </div>

      <div class="m-ctrl">
        <!-- prev -->
        <button class="mc" id="btn-prev" title="Previous">
          <svg viewBox="0 0 24 24" fill="currentColor"><path d="M6 6h2v12H6zm3.5 6 8.5 6V6z"/></svg>
        </button>
        <!-- play/pause -->
        <button class="mc play" id="btn-play" title="Play / Pause">
          <svg id="ico-play" viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg>
          <svg id="ico-pause" viewBox="0 0 24 24" fill="currentColor" style="display:none"><path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/></svg>
        </button>
        <!-- next -->
        <button class="mc" id="btn-next" title="Next">
          <svg viewBox="0 0 24 24" fill="currentColor"><path d="M6 18l8.5-6L6 6v12zm8-12v12h2V6h-2z"/></svg>
        </button>
      </div>

      <span class="m-src" id="msrc"></span>
    </div>

  </div>
</div>

<script>
'use strict';

const N = document.getElementById('N');

/* ── Click-through ──────────────────────────────── */
let over = false;
window.addEventListener('mousemove', e => {
  const r = N.getBoundingClientRect();
  const inside = e.clientX >= r.left && e.clientX <= r.right &&
                 e.clientY >= r.top  && e.clientY <= r.bottom;
  if (inside && !over)  { over = true;  window.api.mouseEnter(); }
  if (!inside && over)  { over = false; window.api.mouseLeave(); }
}, { passive: true });

/* ── Hover expand ───────────────────────────────── */
let leaveT;
N.addEventListener('mouseenter', () => { clearTimeout(leaveT); N.classList.add('open'); });
N.addEventListener('mouseleave', () => { leaveT = setTimeout(() => N.classList.remove('open'), 160); });

/* ── Clock ──────────────────────────────────────── */
const DAYS   = ['SUN','MON','TUE','WED','THU','FRI','SAT'];
const MONTHS = ['JAN','FEB','MAR','APR','MAY','JUN',
                'JUL','AUG','SEP','OCT','NOV','DEC'];

function tick() {
  const n = new Date();
  let h = n.getHours();
  const m  = String(n.getMinutes()).padStart(2, '0');
  const ap = h >= 12 ? 'PM' : 'AM';
  h = h % 12 || 12;
  document.getElementById('pt').textContent = `${h}:${m} ${ap}`;
  document.getElementById('et').textContent = `${h}:${m}`;
  document.getElementById('ed').textContent =
    `${DAYS[n.getDay()]}, ${MONTHS[n.getMonth()]} ${n.getDate()}`;
}
tick(); setInterval(tick, 1000);

/* ── Stats ──────────────────────────────────────── */
function barClass(p) { return p >= 80 ? 'high' : p >= 55 ? 'mid' : ''; }

async function stats() {
  try {
    const s = await window.api.getStats();
    document.getElementById('p-cpu').textContent = s.cpu + '%';

    const cf = document.getElementById('cpu-f');
    cf.style.width = s.cpu + '%';
    cf.className   = 's-fill ' + barClass(s.cpu);
    document.getElementById('cpu-v').textContent = s.cpu + '%';

    const rf = document.getElementById('ram-f');
    rf.style.width = s.ram + '%';
    rf.className   = 's-fill ' + barClass(s.ram);
    document.getElementById('ram-v').textContent = s.ram + '%';
  } catch(_){}
}
stats(); setInterval(stats, 2500);

/* ── Media ──────────────────────────────────────── */
function srcInfo(raw) {
  if (!raw) return { cls: '', label: '' };
  const s = raw.toLowerCase();
  if (s.includes('spotify'))                                   return { cls: 'sp', label: '● Spotify' };
  if (s.includes('chrome') || s.includes('msedge') ||
      s.includes('firefox'))                                   return { cls: 'yt', label: '▶ Browser' };
  return { cls: 'br', label: '◎ Media' };
}

function setPlayIcon(playing) {
  document.getElementById('ico-play').style.display  = playing ? 'none' : '';
  document.getElementById('ico-pause').style.display = playing ? '' : 'none';
}

let lastArt = '';

async function media() {
  try {
    const m = await window.api.getMedia();
    if (!m?.title) {
      document.getElementById('mt').textContent = 'Nothing playing';
      document.getElementById('ma').textContent = 'Play YouTube, Spotify or any media';
      document.getElementById('mp').style.width = '0%';
      document.getElementById('msrc').className = 'm-src';
      document.getElementById('d-media').className = 'dot';
      document.getElementById('m-art').innerHTML = `<div class="m-art-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M9 18V5l12-2v13"/><circle cx="6" cy="18" r="3"/><circle cx="18" cy="16" r="3"/></svg></div>`;
      setPlayIcon(false);
      return;
    }

    document.getElementById('mt').textContent = m.title  || '—';
    document.getElementById('ma').textContent = m.artist || '—';

    if (m.dur > 0)
      document.getElementById('mp').style.width = ((m.pos / m.dur) * 100).toFixed(1) + '%';

    setPlayIcon(!!m.playing);

    const dot = document.getElementById('d-media');
    dot.className = m.playing ? 'dot beat' : 'dot on';

    const { cls, label } = srcInfo(m.src);
    const srcEl = document.getElementById('msrc');
    srcEl.textContent = label;
    srcEl.className   = 'm-src ' + cls;

    if (m.art && m.art !== lastArt) {
      lastArt = m.art;
      const artEl = document.getElementById('m-art');
      const img = new Image();
      img.onload = () => {
        artEl.innerHTML = '';
        const el = document.createElement('img');
        el.src = img.src;
        artEl.appendChild(el);
      };
      img.onerror = () => {};
      img.src = 'data:image/jpeg;base64,' + m.art;
    }
  } catch(_){}
}
media(); setInterval(media, 1800);
</script>
</body>
</html>
