<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>WinNotch</title>
<style>
/* ═══════════════════════════════════════════
   FONT — Local Sora font from assets
═══════════════════════════════════════════ */
@font-face {
  font-family: 'Sora';
  src: url('assets/fonts/Sora-Regular.ttf') format('truetype');
  font-weight: 400;
  font-style: normal;
}
@font-face {
  font-family: 'Sora';
  src: url('assets/fonts/Sora-Light.ttf') format('truetype');
  font-weight: 300;
  font-style: normal;
}
@font-face {
  font-family: 'Sora';
  src: url('assets/fonts/Sora-SemiBold.ttf') format('truetype');
  font-weight: 600;
  font-style: normal;
}

:root {
  --font-primary: 'Sora', -apple-system, BlinkMacSystemFont, system-ui, sans-serif;

  /* pill sizes */
  --cw: 264px;   /* collapsed width  */
  --ch: 34px;    /* collapsed height */
  --ew: 476px;   /* expanded width   */
  --eh: 142px;   /* expanded height  */

  /* colours */
  --ink:   #000000;
  --w100:  #ffffff;
  --w88:   rgba(255,255,255,0.88);
  --w60:   rgba(255,255,255,0.60);
  --w36:   rgba(255,255,255,0.36);
  --w18:   rgba(255,255,255,0.18);
  --w10:   rgba(255,255,255,0.10);
  --w06:   rgba(255,255,255,0.06);
  --w04:   rgba(255,255,255,0.04);
  --rim:   rgba(255,255,255,0.09);

  --green: #30d158;
  --amber: #ff9f0a;
  --red:   #ff453a;

  /* Apple Dynamic Island spring */
  --spring: cubic-bezier(0.36, 0.66, 0.04, 1);
}

/* ═══════════════════════════════════════════
   RESET
═══════════════════════════════════════════ */
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

html, body {
  width:  100vw;
  height: 148px;
  background: transparent;
  overflow: hidden;
  font-family: var(--font-primary);
  -webkit-font-smoothing: antialiased;
  user-select: none;
  pointer-events: none;
}

/* ═══════════════════════════════════════════
   SHADOW WRAPPER
═══════════════════════════════════════════ */
#shadow-wrap {
  pointer-events: none;
  position: absolute;
  top: 0;
  left: 50%;
  transform: translateX(-50%);
  width:  var(--cw);
  height: var(--ch);
  border-radius: 0 0 15px 15px; /* Changed to 15px */
  filter: drop-shadow(0 6px 18px rgba(0,0,0,0.75))
          drop-shadow(0 2px  6px rgba(0,0,0,0.55));
  transition:
    width         520ms var(--spring),
    height        520ms var(--spring),
    border-radius 520ms var(--spring),
    filter        400ms ease;
  will-change: width, height;
  z-index: 0;
}

#shadow-wrap::before {
  content: '';
  position: absolute;
  inset: 0;
  background: var(--ink);
  border-radius: inherit;
}

#shadow-wrap.open {
  width:  var(--ew);
  height: var(--eh);
  border-radius: 0 0 26px 26px;
  filter: drop-shadow(0 10px 32px rgba(0, 0, 0, 0))
          drop-shadow(0  3px  8px rgba(0, 0, 0, 0));
}

/* ═══════════════════════════════════════════
   NOTCH PILL
═══════════════════════════════════════════ */
#notch {
  pointer-events: all;
  position: absolute;
  top: 0;
  left: 50%;
  transform: translateX(-50%);
  z-index: 1;
  width:  var(--cw);
  height: var(--ch);
  background: var(--ink);
  border: 0.5px solid #ebe9e91e;
  border-top: none;
  border-radius: 0 0 15px 15px; /* Changed to 15px */
  overflow: hidden;
  transition:
    width         520ms var(--spring),
    height        520ms var(--spring),
    border-radius 520ms var(--spring);
  will-change: width, height;
}

#notch.open {
  width:  var(--ew);
  height: var(--eh);
  border-radius: 0 0 26px 26px;
  border-color: rgba(255,255,255,0.11);
}

/* Rest of your CSS remains exactly the same from here... */
/* [Keep all your existing CSS from this point] */

/* ═══════════════════════════════════════════
   COLLAPSED PILL
═══════════════════════════════════════════ */
#pill {
  position: absolute; inset: 0;
  display: flex; align-items: center;
  justify-content: space-between;
  padding: 0 15px;
  z-index: 2;
  transition: opacity 180ms ease, transform 250ms var(--spring);
}
#notch.open #pill {
  opacity: 0;
  transform: scale(0.92) translateY(-3px);
  pointer-events: none;
}

.p-time {
  font-size: 13px;
  font-weight: 400;
  color: var(--w88);
  letter-spacing: 0.02em;
  font-variant-numeric: tabular-nums;
}

.p-dots { display: flex; gap: 5px; align-items: center; }

.dot {
  width: 4px; height: 4px;
  border-radius: 50%;
  background: var(--w18);
  transition: background 0.35s, box-shadow 0.35s, transform 0.28s;
}
.dot.on {
  background: var(--w100);
  box-shadow: 0 0 5px rgba(255,255,255,0.45);
  transform: scale(1.1);
}
.dot.beat {
  background: var(--green);
  box-shadow: 0 0 7px rgba(48,209,88,0.85);
  animation: beat 1.1s ease-in-out infinite;
}
@keyframes beat {
  0%, 100% { transform: scale(1);    }
  50%       { transform: scale(1.5); }
}

.p-cpu {
  font-size: 10.5px;
  color: var(--w36);
  font-variant-numeric: tabular-nums;
  letter-spacing: 0.02em;
}

/* ═══════════════════════════════════════════
   EXPANDED PANEL
═══════════════════════════════════════════ */
#panel {
  position: absolute; inset: 0;
  padding: 11px 14px 10px;
  display: flex; flex-direction: column; gap: 7px;
  pointer-events: none;
  opacity: 0;
  transform: translateY(-6px) scale(0.982);
  transition:
    opacity   270ms ease 90ms,
    transform 420ms var(--spring) 70ms;
}
#notch.open #panel {
  opacity: 1;
  transform: none;
  pointer-events: all;
}

/* Top row: Clock + Stats */
.top {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 8px;
}

/* Clock */
.clk {
  display: flex;
  flex-direction: column;
  line-height: 1;
}
.clk-hm {
  font-size: 36px;
  font-weight: 300;
  color: var(--w100);
  letter-spacing: -0.05em;
  font-variant-numeric: tabular-nums;
  line-height: 0.95;
}
.clk-date {
  font-size: 9px;
  color: var(--w36);
  letter-spacing: 0.13em;
  text-transform: uppercase;
  margin-top: 4px;
}

/* Stats column */
.stats {
  display: flex;
  flex-direction: column;
  gap: 5px;
  min-width: 138px;
}

.stat {
  display: flex;
  align-items: center;
  gap: 7px;
}

/* SVG icon */
.stat-ico {
  width: 13px; height: 13px;
  flex-shrink: 0;
  color: var(--w36);
  display: flex; align-items: center; justify-content: center;
}
.stat-ico svg { width: 13px; height: 13px; display: block; }

.stat-bar {
  flex: 1;
  height: 3px;
  background: rgba(255,255,255,0.09);
  border-radius: 2px;
  overflow: hidden;
}
.stat-fill {
  height: 100%;
  border-radius: 2px;
  background: rgba(255,255,255,0.52);
  width: 0%;
  transition: width 0.9s var(--spring), background 0.4s;
}
.stat-fill.mid  { background: var(--amber); }
.stat-fill.high { background: var(--red);   }

.stat-val {
  font-size: 10px;
  color: var(--w60);
  font-variant-numeric: tabular-nums;
  min-width: 28px;
  text-align: right;
  flex-shrink: 0;
}

/* Divider */
.div {
  height: 1px;
  background: linear-gradient(90deg, transparent, rgba(255,255,255,0.09), transparent);
  flex-shrink: 0;
  margin: 0 2px;
}

/* Media row */
.media {
  display: flex;
  align-items: center;
  gap: 9px;
  flex: 1;
  min-height: 0;
}

/* Art */
.art {
  width: 36px; height: 36px;
  border-radius: 8px;
  flex-shrink: 0;
  overflow: hidden;
  background: var(--w06);
  position: relative;
  display: flex; align-items: center; justify-content: center;
}
.art img {
  position: absolute; inset: 0;
  width: 100%; height: 100%;
  object-fit: cover;
  border-radius: 8px;
}
.art-ico { color: var(--w36); }
.art-ico svg { width: 17px; height: 17px; }

/* Track info */
.track {
  flex: 1;
  min-width: 0;
  display: flex; flex-direction: column; gap: 1px;
}
.track-title {
  font-size: 12px;
  font-weight: 400;
  color: var(--w88);
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  line-height: 1.3;
}
.track-artist {
  font-size: 10px;
  color: var(--w36);
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  line-height: 1.3;
}
.track-prog {
  height: 2px;
  background: rgba(255,255,255,0.08);
  border-radius: 1px;
  overflow: hidden;
  margin-top: 5px;
}
.track-prog-fill {
  height: 100%;
  border-radius: 1px;
  background: rgba(255,255,255,0.42);
  width: 0%;
  transition: width 1.3s linear;
}

/* Controls */
.ctrl { display: flex; align-items: center; gap: 1px; flex-shrink: 0; }

.mc {
  width: 28px; height: 28px;
  border-radius: 50%; border: none; background: transparent;
  color: var(--w36);
  display: flex; align-items: center; justify-content: center;
  cursor: pointer;
  transition: color 90ms, background 90ms, transform 70ms;
}
.mc:hover  { color: var(--w88); background: var(--w06); }
.mc:active { transform: scale(0.78); }
.mc svg    { width: 13px; height: 13px; }

.mc.pp {
  width: 30px; height: 30px;
  background: var(--w10);
  color: var(--w88);
  border: 1px solid var(--w18);
}
.mc.pp:hover { background: var(--w18); }
.mc.pp svg { width: 14px; height: 14px; }

/* Source badge */
.badge {
  font-size: 7.5px;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  padding: 2px 6px;
  border-radius: 100px;
  flex-shrink: 0;
  display: none;
  align-items: center;
  border: 1px solid;
}
.badge.yt { display:flex; color:#ff4040; border-color:rgba(255,64,64,0.25); background:rgba(255,64,64,0.07); }
.badge.sp { display:flex; color:var(--green); border-color:rgba(48,209,88,0.25); background:rgba(48,209,88,0.07); }
.badge.br { display:flex; color:var(--w36); border-color:var(--rim); background:var(--w04); }
</style>
</head>
<body>

<!-- Shadow wrapper -->
<div id="shadow-wrap"></div>

<div id="notch">

  <!-- COLLAPSED -->
  <div id="pill">
    <span class="p-time" id="pt">12:00 PM</span>
    <div class="p-dots">
      <div class="dot" id="d-media"></div>
      <div class="dot on"></div>
      <div class="dot on"></div>
    </div>
    <span class="p-cpu" id="p-cpu">--%</span>
  </div>

  <!-- EXPANDED -->
  <div id="panel">
    <div class="top">
      <!-- Clock -->
      <div class="clk">
        <div class="clk-hm"   id="et">12:00</div>
        <div class="clk-date" id="ed">SAT, MAR 14</div>
      </div>

      <!-- Stats -->
      <div class="stats">
        <!-- CPU -->
        <div class="stat">
          <div class="stat-ico">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6">
              <rect x="4" y="4" width="16" height="16" rx="2"/>
              <rect x="8" y="8" width="8"  height="8"  rx="1"/>
              <line x1="9"  y1="1"  x2="9"  y2="4"/>
              <line x1="15" y1="1"  x2="15" y2="4"/>
              <line x1="9"  y1="20" x2="9"  y2="23"/>
              <line x1="15" y1="20" x2="15" y2="23"/>
              <line x1="1"  y1="9"  x2="4"  y2="9"/>
              <line x1="1"  y1="15" x2="4"  y2="15"/>
              <line x1="20" y1="9"  x2="23" y2="9"/>
              <line x1="20" y1="15" x2="23" y2="15"/>
            </svg>
          </div>
          <div class="stat-bar">
            <div class="stat-fill" id="cpu-fill" style="width:0%"></div>
          </div>
          <span class="stat-val" id="cpu-val">--%</span>
        </div>

        <!-- RAM -->
        <div class="stat">
          <div class="stat-ico">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6">
              <rect x="1"  y="7"  width="22" height="10" rx="2"/>
              <line x1="5"  y1="7"  x2="5"  y2="17"/>
              <line x1="9"  y1="7"  x2="9"  y2="17"/>
              <line x1="13" y1="7"  x2="13" y2="17"/>
              <line x1="17" y1="7"  x2="17" y2="17"/>
              <line x1="5"  y1="3"  x2="5"  y2="7"/>
              <line x1="9"  y1="3"  x2="9"  y2="7"/>
              <line x1="15" y1="3"  x2="15" y2="7"/>
              <line x1="19" y1="3"  x2="19" y2="7"/>
              <line x1="5"  y1="17" x2="5"  y2="21"/>
              <line x1="9"  y1="17" x2="9"  y2="21"/>
              <line x1="15" y1="17" x2="15" y2="21"/>
              <line x1="19" y1="17" x2="19" y2="21"/>
            </svg>
          </div>
          <div class="stat-bar">
            <div class="stat-fill" id="ram-fill" style="width:0%"></div>
          </div>
          <span class="stat-val" id="ram-val">--%</span>
        </div>
      </div>
    </div>

    <div class="div"></div>

    <!-- Media -->
    <div class="media">
      <div class="art" id="m-art">
        <div class="art-ico">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6">
            <path d="M9 18V5l12-2v13"/>
            <circle cx="6"  cy="18" r="3"/>
            <circle cx="18" cy="16" r="3"/>
          </svg>
        </div>
      </div>

      <div class="track">
        <div class="track-title"  id="m-title">Nothing playing</div>
        <div class="track-artist" id="m-artist">Play YouTube, Spotify or any media</div>
        <div class="track-prog">
          <div class="track-prog-fill" id="m-prog" style="width:0%"></div>
        </div>
      </div>

      <div class="ctrl">
        <button class="mc" id="btn-prev" title="Previous">
          <svg viewBox="0 0 24 24" fill="currentColor"><path d="M6 6h2v12H6zm3.5 6 8.5 6V6z"/></svg>
        </button>
        <button class="mc pp" id="btn-play" title="Play / Pause">
          <svg id="ico-play"  viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg>
          <svg id="ico-pause" viewBox="0 0 24 24" fill="currentColor" style="display:none"><path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/></svg>
        </button>
        <button class="mc" id="btn-next" title="Next">
          <svg viewBox="0 0 24 24" fill="currentColor"><path d="M6 18l8.5-6L6 6v12zm8-12v12h2V6h-2z"/></svg>
        </button>
      </div>

      <span class="badge" id="m-badge"></span>
    </div>
  </div>
</div>

<script>
'use strict';

const notch      = document.getElementById('notch');
const shadowWrap = document.getElementById('shadow-wrap');

/* Mouse tracking */
let overNotch = false;
let leaveTimer;
let expandTimer;

window.addEventListener('mousemove', e => {
  const r = notch.getBoundingClientRect();
  const inside =
    e.clientX >= r.left && e.clientX <= r.right &&
    e.clientY >= r.top  && e.clientY <= r.bottom;

  if (inside && !overNotch) {
    overNotch = true;
    if (window.api && window.api.mouseEnter) window.api.mouseEnter();
  } else if (!inside && overNotch) {
    overNotch = false;
    if (window.api && window.api.mouseLeave) window.api.mouseLeave();
  }
}, { passive: true });

/* Hover: expand with delay, collapse instantly when mouse leaves */
function expand() {
  clearTimeout(leaveTimer);
  clearTimeout(expandTimer);
  expandTimer = setTimeout(() => {
    notch.classList.add('open');
    shadowWrap.classList.add('open');
  }, 50); // Small delay to prevent accidental expansion
}

function collapse() {
  clearTimeout(expandTimer);
  notch.classList.remove('open');
  shadowWrap.classList.remove('open');
}

notch.addEventListener('mouseenter', expand);
notch.addEventListener('mouseleave', collapse);

/* Clock */
const DAYS   = ['SUN','MON','TUE','WED','THU','FRI','SAT'];
const MONTHS = ['JAN','FEB','MAR','APR','MAY','JUN',
                'JUL','AUG','SEP','OCT','NOV','DEC'];

function tick() {
  const n  = new Date();
  let   h  = n.getHours();
  const m  = String(n.getMinutes()).padStart(2, '0');
  const ap = h >= 12 ? 'PM' : 'AM';
  h = h % 12 || 12;
  document.getElementById('pt').textContent = `${h}:${m} ${ap}`;
  document.getElementById('et').textContent = `${h}:${m}`;
  document.getElementById('ed').textContent =
    `${DAYS[n.getDay()]}, ${MONTHS[n.getMonth()]} ${n.getDate()}`;
}
tick();
setInterval(tick, 1000);

/* Stats */
function barClass(p) {
  return p >= 80 ? 'high' : p >= 55 ? 'mid' : '';
}

async function refreshStats() {
  try {
    if (!window.api || !window.api.getStats) return;
    const s = await window.api.getStats();

    document.getElementById('p-cpu').textContent = s.cpu + '%';

    const cf = document.getElementById('cpu-fill');
    cf.style.width = s.cpu + '%';
    cf.className   = 'stat-fill ' + barClass(s.cpu);
    document.getElementById('cpu-val').textContent = s.cpu + '%';

    const rf = document.getElementById('ram-fill');
    rf.style.width = s.ram + '%';
    rf.className   = 'stat-fill ' + barClass(s.ram);
    document.getElementById('ram-val').textContent = s.ram + '%';
  } catch (_) {}
}
refreshStats();
setInterval(refreshStats, 2500);

//* Media with better browser detection */
function srcInfo(raw) {
  if (!raw) return { cls: '', label: '' };
  const s = raw.toLowerCase();
  if (s.includes('spotify')) return { cls: 'sp', label: '● Spotify' };
  if (s.includes('chrome') || s.includes('msedge') ||
      s.includes('firefox') || s.includes('browser')) return { cls: 'yt', label: '▶ Browser' };
  if (s.includes('youtube')) return { cls: 'yt', label: '▶ YouTube' };
  return { cls: 'br', label: '◎ Media' };
}

let lastArt   = '';
let lastTitle = '';

async function refreshMedia() {
  try {
    if (!window.api || !window.api.getMedia) return;
    const m = await window.api.getMedia();

    if (!m || !m.title) {
      document.getElementById('m-title').textContent  = 'Nothing playing';
      document.getElementById('m-artist').textContent = 'Play YouTube, Spotify or any media';
      document.getElementById('m-prog').style.width   = '0%';
      document.getElementById('m-badge').className    = 'badge';
      document.getElementById('d-media').className    = 'dot';
      if (lastTitle !== '') {
        document.getElementById('m-art').innerHTML = ART_PLACEHOLDER;
        lastArt = ''; lastTitle = '';
      }
      setPlayIcon(false);
      return;
    }

    // Handle browser media specially
    if (m.title === "Media playing in browser") {
      document.getElementById('m-title').textContent = '▶ Media Playing';
      document.getElementById('m-artist').textContent = m.artist || 'Click browser controls';
      document.getElementById('m-prog').style.width = '0%';
      document.getElementById('d-media').className = 'dot beat';
      document.getElementById('m-badge').className = 'badge yt';
      document.getElementById('m-badge').textContent = '▶ Browser';
      setPlayIcon(true);
      return;
    }

    // Normal media display
    document.getElementById('m-title').textContent  = m.title  || '—';
    document.getElementById('m-artist').textContent = m.artist || m.album || '—';

    if (m.dur > 0) {
      const pct = Math.min(100, (m.pos / m.dur) * 100);
      document.getElementById('m-prog').style.width = pct.toFixed(1) + '%';
    } else {
      document.getElementById('m-prog').style.width = '0%';
    }

    setPlayIcon(!!m.playing);

    document.getElementById('d-media').className =
      m.playing ? 'dot beat' : 'dot on';

    const { cls, label } = srcInfo(m.src);
    const badge = document.getElementById('m-badge');
    badge.textContent = label;
    badge.className   = 'badge ' + cls;

    if (m.art && m.art !== lastArt) {
      lastArt = m.art;
      const artEl = document.getElementById('m-art');
      const img   = new Image();
      img.onload = () => {
        artEl.innerHTML = '';
        const el = document.createElement('img');
        el.src = img.src;
        artEl.appendChild(el);
      };
      img.onerror = () => {
        artEl.innerHTML = ART_PLACEHOLDER;
      };
      img.src = 'data:image/jpeg;base64,' + m.art;
    } else if (!m.art && m.title !== lastTitle) {
      document.getElementById('m-art').innerHTML = ART_PLACEHOLDER;
      lastArt = '';
    }

    lastTitle = m.title;

  } catch (_) {}

}

refreshMedia();
setInterval(refreshMedia, 1800);
</script>
</body>
</html>
